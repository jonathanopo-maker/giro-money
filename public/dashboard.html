<h1>Painel</h1>

<h2 id="total">Total: R$0</h2>
<h2 id="lucro">Lucro: R$0</h2>

<button onclick="novaVenda()">Nova venda</button>

<script>
async function carregar() {
  let res = await fetch("/vendas");
  let vendas = await res.json();

  let total = 0;
  let lucro = 0;

  vendas.forEach(v => {
    total += Number(v.valor);
    lucro += (v.valor - v.custo);
  });

  document.getElementById("total").innerText = "Total: R$" + total.toFixed(2);
  document.getElementById("lucro").innerText = "Lucro: R$" + lucro.toFixed(2);
}

async function novaVenda() {
  let valor = prompt("Valor:");
  let custo = prompt("Custo:");

  await fetch("/venda", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({ valor, custo })
  });

  carregar();
}

carregar();
</script>
